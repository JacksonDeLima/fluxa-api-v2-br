services:
  postgres:
    image: postgres:16
    container_name: fluxa-db
    environment:
      POSTGRES_DB: fluxa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fluxa"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  fluxa-api:
    profiles:
      - fullstack
    build:
      context: .
    container_name: fluxa-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/fluxa
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change-me-in-production-with-a-long-secret-key
      JWT_EXPIRATION_MS: 86400000
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/actuator/health/readiness > /dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
