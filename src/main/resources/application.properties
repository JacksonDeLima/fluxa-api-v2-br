spring.application.name=fluxa-api
spring.profiles.default=dev

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.locations=classpath:db/migration

server.port=${SERVER_PORT:8080}
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF

management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoints.access.default=read_only
management.endpoint.prometheus.access=read_only
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.group.readiness.include=readinessState,db,ping
management.endpoint.health.group.liveness.include=livenessState,ping
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.info.env.enabled=true
management.metrics.tags.application=${spring.application.name}

info.app.name=${spring.application.name}
info.app.description=API REST para gestao de tarefas com autenticacao JWT
info.runtime.profile=${spring.profiles.active:${spring.profiles.default:default}}

fluxa.rate-limit.enabled=true
fluxa.rate-limit.auth.max-requests=${RATE_LIMIT_AUTH_MAX_REQUESTS:10}
fluxa.rate-limit.auth.window-seconds=${RATE_LIMIT_AUTH_WINDOW_SECONDS:60}
fluxa.rate-limit.admin.max-requests=${RATE_LIMIT_ADMIN_MAX_REQUESTS:60}
fluxa.rate-limit.admin.window-seconds=${RATE_LIMIT_ADMIN_WINDOW_SECONDS:60}
fluxa.rate-limit.api.max-requests=${RATE_LIMIT_API_MAX_REQUESTS:120}
fluxa.rate-limit.api.window-seconds=${RATE_LIMIT_API_WINDOW_SECONDS:60}
