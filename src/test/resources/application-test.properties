spring.datasource.url=jdbc:h2:mem:fluxa;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.flyway.locations=classpath:db/migration

jwt.secret=VGhpc0lzQVN1cGVyU2VjcmV0S2V5Rm9ySldUVG9rZW5HZW5lcmF0aW9uMTIzNDU2
jwt.expiration=86400000

management.endpoint.health.show-details=always
management.endpoint.prometheus.access=read_only
logging.level.root=WARN
logging.level.com.jacksondelima.fluxa=INFO

fluxa.rate-limit.auth.max-requests=2
fluxa.rate-limit.auth.window-seconds=60
fluxa.rate-limit.admin.max-requests=20
fluxa.rate-limit.admin.window-seconds=60
fluxa.rate-limit.api.max-requests=20
fluxa.rate-limit.api.window-seconds=60
